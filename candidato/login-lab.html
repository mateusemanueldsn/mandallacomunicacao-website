<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Mandalla Lab</title>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <link rel="stylesheet" href="../styles.css">
    <link rel="icon" type="image/png" href="../assets/favicon_mandalla.png">

    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f8f8f8;
            position: relative;
            overflow-x: hidden;
            padding: 80px 5%;
        }

        /* Interactive Canvas Background */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: #fff;
        }

        /* Login Card */
        .login-card {
            width: 100%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 40px;
            padding: 4rem 3rem;
            position: relative;
            z-index: 10;
            box-shadow: none;

            animation: cardEntrance 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .login-header .logo-lab {
            width: 120px;
            margin-bottom: 2rem;
        }

        .login-header h1 {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 0.8rem;
            color: #000;
            padding-left: 5px;
        }

        .form-input {
            width: 100%;
            padding: 1.2rem 1.5rem;
            background: #fff;
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 20px;
            font-family: inherit;
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--turquesa);
            box-shadow: none;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            font-size: 0.85rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .forgot-password {
            color: var(--turquesa);
            text-decoration: none;
            font-weight: 700;
        }

        .btn-login {
            width: 100%;
            padding: 1.2rem;
            background: var(--turquesa);
            color: #fff;
            border: none;
            border-radius: 20px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 1.5rem;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: none;
            filter: brightness(1.1);
        }

        /* Google Login */
        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 2rem 0;
            color: rgba(0,0,0,0.2);
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(0,0,0,0.05);
        }

        .btn-google {
            width: 100%;
            padding: 1.2rem;
            background: #fff;
            color: #000;
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 20px;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.9rem;
        }

        .btn-google:hover {
            background: #fafafa;
            border-color: rgba(0,0,0,0.2);
            transform: translateY(-2px);
        }

        .btn-google img {
            width: 20px;
        }

        .back-to-site {
            position: absolute;
            top: 2rem;
            left: 2rem;
            z-index: 100;
            color: #000;
            text-decoration: none;
            font-weight: 900;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            transition: var(--transition);
        }

        .back-to-site:hover {
            opacity: 0.6;
            transform: translateX(-5px);
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 3rem 1.5rem;
                border-radius: 30px;
            }
            .login-header h1 {
                font-size: 1.5rem;
            }
            .login-page {
                padding: 60px 1rem;
            }
        }
    </style>
</head>

<body class="login-page">
    <canvas id="bg-canvas"></canvas>

    <a href="../index.html" class="back-to-site">
        <i class="ph ph-arrow-left"></i> Voltar ao site
    </a>

    <div class="login-card">
        <div class="login-header">
            <img src="../assets/logo.svg" alt="Mandalla Logo" class="logo-lab">
            <h1>Entrar no Lab</h1>
            <p>Acesse o ecossistema de inteligência Mandalla.</p>
        </div>

        <form>
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" class="form-input" placeholder="seu@email.com">
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" class="form-input" placeholder="••••••••">
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox"> Lembrar acesso
                </label>
                <a href="#" class="forgot-password">Esqueci a senha</a>
            </div>

            <button type="button" class="btn-login" onclick="window.location.href='index-lab.html'">Entrar no Lab</button>
        </form>

        <div class="divider">ou</div>

        <button type="button" class="btn-google" onclick="window.location.href='index-lab.html'">
            <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="Google Icon">
            Entrar com o Google
        </button>
    </div>

    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const mouse = { x: null, y: null, radius: 150 };

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.baseX = this.x;
                this.baseY = this.y;
                this.density = (Math.random() * 30) + 1;
            }

            draw() {
                ctx.fillStyle = '#4CB2AB';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.closePath();
                ctx.fill();
            }

            update() {
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                let forceDirectionX = dx / distance;
                let forceDirectionY = dy / distance;
                let maxDistance = mouse.radius;
                let force = (maxDistance - distance) / maxDistance;
                let directionX = forceDirectionX * force * this.density;
                let directionY = forceDirectionY * force * this.density;

                if (distance < mouse.radius) {
                    this.x -= directionX;
                    this.y -= directionY;
                } else {
                    if (this.x !== this.baseX) {
                        let dx = this.x - this.baseX;
                        this.x -= dx / 10;
                    }
                    if (this.y !== this.baseY) {
                        let dy = this.y - this.baseY;
                        this.y -= dy / 10;
                    }
                }
            }
        }

        function init() {
            particles = [];
            const numberOfParticles = (canvas.width * canvas.height) / 9000;
            for (let i = 0; i < numberOfParticles; i++) {
                particles.push(new Particle());
            }
        }

        function connect() {
            for (let a = 0; a < particles.length; a++) {
                for (let b = a; b < particles.length; b++) {
                    let dx = particles[a].x - particles[b].x;
                    let dy = particles[a].y - particles[b].y;
                    let distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 120) {
                        ctx.strokeStyle = `rgba(76, 178, 171, ${1 - distance / 120})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particles[a].x, particles[a].y);
                        
                        // Arched connection
                        // Use the midpoint and offset it to create a curve
                        let midX = (particles[a].x + particles[b].x) / 2;
                        let midY = (particles[a].y + particles[b].y) / 2;
                        
                        // Control point offset - creates the "portal" arch feel
                        // Offset the control point upwards or relative to the distance
                        let controlOffset = distance * 0.2;
                        ctx.quadraticCurveTo(midX, midY - controlOffset, particles[b].x, particles[b].y);
                        
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].draw();
                particles[i].update();
            }
            connect();
            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>

</html>
